# Build and test JmDNS on multiple JDKs.
# Compile requires JDK 21+ (multi-release java21 sources); the shipped jar targets Java 8.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [8, 11, 17, 21]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDKs (21 for compile + ${{ matrix.java }} for tests)
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: |
          21
          ${{ matrix.java }}
        cache: maven

    - name: Build and test on JDK ${{ matrix.java }}
      run: |
        if [ "${{ matrix.java }}" = "8" ]; then
          mvn -B package -DskipTests --file pom.xml
        else
          mvn -B verify -Dtest.jdk.version=${{ matrix.java }} --file pom.xml
        fi

    - name: Verify Java 8 bytecode and multi-release layout
      if: matrix.java == '8'
      run: |
        JAR=$(ls target/jmdns-*.jar | head -1)
        echo "Verifying $JAR"
        jar tf "$JAR" | grep -q 'META-INF/versions/21/javax/jmdns/impl/util/ExecutorServiceFactory.class'
        javap -classpath "$JAR" javax.jmdns.impl.util.ExecutorServiceFactory | grep -q 'major version: 52'
        ! javap -classpath "$JAR" javax.jmdns.impl.util.ExecutorServiceFactory | grep -q 'newVirtualThreadPerTaskExecutor'

    - name: Verify virtual-thread implementation on JDK 21
      if: matrix.java == '21'
      run: |
        JAR=$(ls target/jmdns-*.jar | head -1)
        javap -classpath "$JAR" javax.jmdns.impl.util.ExecutorServiceFactory | grep -q 'newVirtualThreadPerTaskExecutor'

    - name: Update dependency graph
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.java == '21'
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
